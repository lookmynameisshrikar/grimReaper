<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Dave Game</title>
<style>
  body { margin:0; background:#111; }
  canvas { display:block; margin:auto; background:#222; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = 800;
canvas.height = 400;

let gravity = 0.5;
let keys = {};

// Player
let player = {
  x: 50,
  y: 300,
  w: 30,
  h: 30,
  dx: 0,
  dy: 0,
  grounded: false
};

// Levels
let levels = [
  {
    platforms: [
      {x:0,y:350,w:800,h:50},
      {x:200,y:280,w:100,h:10},
      {x:400,y:220,w:100,h:10}
    ],
    coin: {x:420,y:190},
    goal: {x:700,y:300}
  },
  {
    platforms: [
      {x:0,y:350,w:800,h:50},
      {x:150,y:300,w:100,h:10},
      {x:350,y:250,w:100,h:10},
      {x:550,y:200,w:100,h:10}
    ],
    coin: {x:570,y:170},
    goal: {x:750,y:300}
  }
];

let currentLevel = 0;

// Controls
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function resetPlayer() {
  player.x = 50;
  player.y = 300;
  player.dx = 0;
  player.dy = 0;
}

function update() {
  // Movement
  if (keys["ArrowLeft"]) player.dx = -3;
  else if (keys["ArrowRight"]) player.dx = 3;
  else player.dx = 0;

  if (keys[" "] && player.grounded) {
    player.dy = -10;
    player.grounded = false;
  }

  player.dy += gravity;
  player.x += player.dx;
  player.y += player.dy;

  player.grounded = false;

  let lvl = levels[currentLevel];

  // Platform collision
  lvl.platforms.forEach(p => {
    if (
      player.x < p.x + p.w &&
      player.x + player.w > p.x &&
      player.y < p.y + p.h &&
      player.y + player.h > p.y
    ) {
      player.y = p.y - player.h;
      player.dy = 0;
      player.grounded = true;
    }
  });

  // Coin pickup
  if (
    Math.abs(player.x - lvl.coin.x) < 20 &&
    Math.abs(player.y - lvl.coin.y) < 20
  ) {
    lvl.coin.x = -100; // hide coin
  }

  // Goal → next level
  if (
    Math.abs(player.x - lvl.goal.x) < 30 &&
    Math.abs(player.y - lvl.goal.y) < 30
  ) {
    currentLevel++;
    if (currentLevel >= levels.length) {
      alert("You Win!");
      currentLevel = 0;
    }
    resetPlayer();
  }
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  let lvl = levels[currentLevel];

  // Player
  ctx.fillStyle = "lime";
  ctx.fillRect(player.x, player.y, player.w, player.h);

  // Platforms
  ctx.fillStyle = "white";
  lvl.platforms.forEach(p => {
    ctx.fillRect(p.x, p.y, p.w, p.h);
  });

  // Coin
  ctx.fillStyle = "yellow";
  ctx.beginPath();
  ctx.arc(lvl.coin.x, lvl.coin.y, 10, 0, Math.PI*2);
  ctx.fill();

  // Goal
  ctx.fillStyle = "red";
  ctx.fillRect(lvl.goal.x, lvl.goal.y, 20, 50);
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
